.stat-card{background:#1A3448;border-radius:14px;padding:18px;text-align:center}

.sp-info{padding:11px 12px;flex:1}

.sp-sci{color:#777;font-size:11px;font-style:italic;margin-bottom:5px}
.sp-det-img{width:100%;max-height:240px;object-fit:cover;display:block}
.sp-det-body{padding:18px 16px}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#1A3448;border-radius:12px;padding:16px;margin-bottom:12px}
.sp-lbl{font-size:11px;letter-spacing:1px;margin-bottom:3px}
.sp-val{font-family:"Josefin Sans",sans-serif;font-weight:700;font-size:15px}
.sp-desc{background:#1A3448;border-radius:12px;padding:16px;color:#F2E8D5;line-height:1.8;font-size:14px}
.cat-lbl{color:#888;font-size:11px;letter-spacing:2px;font-weight:700;padding:12px 4px 5px;text-transform:uppercase}
.info-box{background:#1A344888;border-radius:9px;padding:10px 14px;margin-bottom:14px;font-size:13px}
</style>
</head>

<script>
var T={lagon:"#0A7E8C",lagonL:"#12B5C8",foret:"#2D5A27",corail:"#D4603A",corailL:"#E8845F",nuit:"#0D1F2D",nuitM:"#1A3448",blanc:"#FAFAF8",gold:"#C9943A",sable:"#F2E8D5"};

var LESSONS=[
{id:1,level:1,title:"Les Personnes & Famille",emoji:"👥",theme:"#0A7E8C",
cours:"Le vocabulaire des personnes est fondamental. En Nêlêmwa/Nixumwak, les relations de parenté sont très précises. « aguk » (var. agu) désigne l'homme, la personne, les gens du pays.",
voc:[
{p:"aguk",k:"aguk",fr:"homme, personne, gens"},
{p:"ak",k:"ak",fr:"homme, mâle"},
{p:"âlô",k:"âlô",fr:"enfant, jeune homme"},
{p:"thaamwa",k:"thaamwa",fr:"femme"},
{p:"âlô hak",k:"âlô hak",fr:"jeune homme"},
{p:"âlô thaamwa",k:"âlô thaamwa",fr:"jeune fille"},
{p:"aroo-n",k:"aroo-n",fr:"mari, époux"},
{p:"â-maawa-n",k:"â-maawa-n",fr:"époux, couple"},
{p:"â-mwala-n",k:"â-mwala-n",fr:"frère et sœur"},
{p:"â-vaama-n",k:"â-vaama-n",fr:"sœur et frère"},
{p:"â-waxi-n",k:"â-waxi-n",fr:"père et fils/fille"},
{p:"â-vabuu-n",k:"â-vabuu-n",fr:"grand-père et petit-fils"},
{p:"â-beega-n",k:"â-beega-n",fr:"cousins"},
{p:"axomoo-n",k:"axomoo-n",fr:"mère, oncle maternel"},
{p:"aayo",k:"aayo",fr:"chef"},
{p:"aman",k:"aman",fr:"envoyé, messager"},
{p:"âbeen",k:"âbeen",fr:"étranger, nouveau"},
{p:"ai",k:"ai",fr:"non ; ou, mais, soit (coordinateur)"},
{p:"whâlirii-n",k:"wââti-n",fr:"oncle maternel"},
],
expr:[
{e:"Elo !",t:"Oui !"},
{e:"Ai !",t:"Non ! / Ou (coordinateur)"},
{e:"Ayai !",t:"Non ! (renforcé)"},
{e:"Au !",t:"Hélas ! (nostalgie)"},
{e:"aroo-ny",t:"mon mari"},
{e:"aayo-ny",t:"mon chef"},
{e:"tâlâ âma-n !",t:"Écoute comme il parle fort !"},
{e:"thu awôlô",t:"préparer le mariage (litt. faire la maison)"},
{e:"âlô i na",t:"ma tante"},
{e:"i u agu",t:"c'est une personne"},
{e:"awa-m lai ai kuvic ?",t:"veux-tu du riz ou de l'igname ?"},
{e:"fo aroo-n",t:"elle est mariée"},
{e:"thu âlô-xâac âlô ena !",t:"il n'en fait qu'à sa tête, cet enfant !"},
{e:"wa noolî u-thu-âlô-xâây-i ye !",t:"regardez son entêtement !"},
{e:"axeena xe i fhe thaamwa ena",t:"cet homme a épousé cette femme"},
{e:"axomoo-ny",t:"ma mère / mon oncle maternel"},
{e:"ayaabwar-i na",t:"mon clan maternel"},
{e:"aye-vââlâ-ny",t:"mon compagnon de route"},
],
diff:[
{p:"naan (P)",k:"aawuk (K)",fr:"mouche"},
{p:"buburenga (P)",k:"aamwep (K)",fr:"tarpon (poisson)"},
{p:"whâlirii-n (P)",k:"wââti-n (K)",fr:"oncle maternel"},
{p:"ava-t (P)",k:"abi-t (K)",fr:"côté, flanc"},
],
quiz:[
{tp:"t",q:"Que signifie « aguk » ?",o:["Chef","Étranger","Homme, personne","Mari"],a:2},
{tp:"t",q:"Que signifie « âlô-raamwa » ?",o:["Jeune homme","Jeune fille","Femme mariée","Enfant"],a:1},
{tp:"m",q:"Comment dit-on « chef » ?",o:["aman","aayo","âbeen","aguk"],a:1},
{tp:"m",q:"Comment dit-on « mari » ?",o:["â-maawa-n","aroo-n","ak","â-mwala-n"],a:1},
{tp:"tf",q:"« Âbeen » signifie cousin.",a:false},

{tp:"f",q:"âlô _____ = jeune homme",a:"hak"},

]},
{id:2,level:2,title:"Les Verbes d'action",emoji:"⚡",theme:"#2D5A27",

{p:"ap",k:"ap",fr:"rire"},

{p:"axe",k:"axe",fr:"voir (inanimé)"},
{p:"axi",k:"axi",fr:"voir, rendre visite (animé)"},
{p:"âbwe",k:"âbwe",fr:"dévier, retourner"},
],

{e:"i ap",t:"il rit"},
{e:"i â",t:"il part"},
{e:"i alu âlô",t:"il observe les enfants"},
{e:"i adaxe",t:"il partage"},
{e:"na alawuk",t:"j'ai faim (Nêlêmwa)"},
{e:"âdap kuru",t:"il n'y a pas de vent"},{e:"âdap fwââmwa",t:"le pays est calme"},{e:"i â shi-n",t:"il va vers lui"},{e:"na aya dua i khiibo-na",t:"j'ai senti la douleur quand il m'a frappé"},{e:"awa-ny me na tu alu o civa eli",t:"je veux aller assister à cette danse"},{e:"cf. maaluk",t:"avoir soif (cf. alawuk = avoir faim)"},
{e:"ayo alu !",t:"ne regarde pas fixement !"},
{e:"i alu i hleena âlô",t:"elle observe ces enfants"},
{e:"i ap thaamwa hleny",t:"cette femme rit"},

  window.scrollTo(0,0);
}

function badge(txt,col){
  return '<span class="badge" style="background:'+col+'22;color:'+col+';border:1px solid '+col+'55">'+txt+'</span>';
}
function pbar(v,max,col){
  var p=Math.min(100,Math.round(v/max*100));
  return '<div class="pbar-wrap"><div class="pbar-fill" style="width:'+p+'%;background:'+col+'"></div></div>';
}
function norm(s){
  return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s-]/g,"");
}

function renderHome(){
  var done=(stats.completed||[]).length;

function buildLessons(){
  var h="";
  LESSONS.forEach(function(l){
    var done=(stats.completed||[]).indexOf(l.id)>=0;
    var sc=(stats.scores||{})[l.id];
    var sc_h=sc?pbar(sc.correct,sc.total,l.theme)+'<div style="color:'+l.theme+';font-size:12px;margin-top:5px">'+Math.round(sc.correct/sc.total*100)+'% de réussite</div>':"";
    h+='<button class="lesson-card" onclick="openLesson('+l.id+')" style="border:1px solid '+(done?l.theme+'66':'#ffffff11')+'">'
      +'<div class="l-ico" style="background:'+l.theme+'22">'+l.emoji+'</div>'
      +'<div class="l-info">'
        +'<div class="l-title">'+badge("Niv."+l.level,l.theme)+(done?badge("✓","#2D5A27"):"")+' '+l.title+'</div>'
        +'<div class="l-meta">'+l.voc.length+' mots · '+l.quiz.length+' questions</div>'
        +sc_h
      +'</div>'
      +'<div style="color:'+l.theme+';font-size:18px">→</div>'
      +'</button>';

}

function openLesson(id){
  curLesson=null;
  for(var i=0;i<LESSONS.length;i++){if(LESSONS[i].id===id){curLesson=LESSONS[i];break;}}
  buildDetail("cours");

}

    tabs_h+='<button class="tab-btn'+(tab===t?' on':'')+'" onclick="buildDetail(\''+t+'\')" style="'+(tab===t?'color:'+l.theme+';background:white':'color:white')+'">'+t+'</button>';
  });
  document.getElementById("d-hdr").innerHTML=

    +'<button onclick="nav(\'s-lessons\')" style="color:rgba(255,255,255,.8);font-size:14px;display:block;margin-bottom:10px;background:transparent;border:0;cursor:pointer;font-family:Inter,sans-serif">← Retour</button>'

    +'<h2 style="font-family:\'Josefin Sans\',sans-serif;font-size:22px;color:white;margin-bottom:8px">'+l.title+'</h2>'
    +badge("Niveau "+l.level,l.theme)

        +'<button onclick="startQuiz()" style="width:100%;background:'+l.theme+';border:0;border-radius:12px;padding:15px;color:white;font-family:\'Josefin Sans\',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer">DÉMARRER LE QUIZ →</button>';

    l.voc.forEach(function(v,i){
      body+='<div class="vrow'+(i%2===0?' alt':'')+'"><span style="color:#12B5C8;font-weight:600;font-size:13px">'+v.p+'</span><span style="color:'+(v.k!==v.p?"#E8845F":"#777")+';font-size:13px">'+v.k+'</span><span style="color:#F2E8D5;font-size:12px">'+v.fr+'</span></div>';
    });
  } else if(tab==="expressions"){
    l.expr.forEach(function(e){
      body+='<div class="expr-card" style="border-left:4px solid '+l.theme+'">'
           +'<span style="color:#12B5C8;font-family:\'Josefin Sans\',sans-serif;font-size:18px;font-weight:700">'+e.e+'</span>'
           +'<span style="color:#F2E8D5;font-size:14px">'+e.t+'</span></div>';
    });
  } else {
    if(!l.diff.length){body='<div style="color:#888;text-align:center;padding:40px">Aucune variante dans cette leçon.</div>';}
    else{
      body='<div class="diff-info">🔀 (P) = Nêlêmwa · (K) = Nixumwak</div>'
          +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:8px;padding:0 6px">'
          +'<span style="color:#12B5C8;font-size:10px;font-weight:700">● Nêlêmwa (P)</span>'
          +'<span style="color:#E8845F;font-size:10px;font-weight:700">● Nixumwak (K)</span>'
          +'<span style="color:#F2E8D5;font-size:10px;font-weight:700">● Français</span></div>';
      l.diff.forEach(function(d){
        body+='<div class="drow"><span style="color:#12B5C8;font-weight:700;font-size:13px">'+d.p+'</span><span style="color:#E8845F;font-weight:700;font-size:13px">'+d.k+'</span><span style="color:#F2E8D5;font-size:12px">'+d.fr+'</span></div>';
      });
    }

  document.getElementById("d-body").innerHTML=body;

function startQuiz(){
  QS={lesson:curLesson,idx:0,score:0,results:[],sel:null,fill:"",shown:false};
  document.getElementById("q-prog").style.background=curLesson.theme;
  document.getElementById("q-close").onclick=function(){nav("s-detail");};
  renderQuiz();
  nav("s-quiz");
}

function startRevQuiz(qs,title,emoji,theme){
  curLesson={id:99,title:title,emoji:emoji,theme:theme,quiz:qs};
  QS={lesson:curLesson,idx:0,score:0,results:[],sel:null,fill:"",shown:false};
  document.getElementById("q-prog").style.background=theme;
  document.getElementById("q-close").onclick=function(){nav("s-revision");};
  renderQuiz();
  nav("s-quiz");
}

function renderQuiz(){
  var l=QS.lesson;
  var q=l.quiz[QS.idx];
  var total=l.quiz.length;
  var shown=QS.shown;
  var sel=QS.sel;
  var fill=QS.fill;
  var typeLbl={t:"Traduction",m:"Choix multiple",tf:"Vrai / Faux",f:"Compléter",s:"Construire",v:"Nêlêmwa/Nixumwak"};

  document.getElementById("q-counter").textContent=(QS.idx+1)+" / "+total;
  document.getElementById("q-pts").textContent=QS.score+" pts";
  document.getElementById("q-prog").style.width=Math.round((QS.idx+1)/total*100)+"%";

  var lastOk=QS.results.length>0?QS.results[QS.results.length-1].ok:null;

  var ans_h="";
  if(q.tp==="t"||q.tp==="m"){
    ans_h='<div class="opts">';
    q.o.forEach(function(opt,i){
      var cls="opt";
      if(shown){if(i===q.a)cls+=" ok";else if(i===sel&&i!==q.a)cls+=" ko";}
      else if(i===sel)cls+=" sel";
      ans_h+='<button class="'+cls+'" onclick="pickOpt('+i+')"'+(shown?" disabled":"")+'>'+
        '<span style="color:'+l.theme+';margin-right:6px;font-family:\'Josefin Sans\',sans-serif">'+String.fromCharCode(65+i)+'.</span>'+opt+'</button>';
    });
    ans_h+='</div>';
  } else if(q.tp==="tf"){
    ans_h='<div class="tf-row">';
    [[true,"✓ VRAI"],[false,"✗ FAUX"]].forEach(function(pair){
      var v=pair[0],lbl=pair[1];
      var cls="tf";
      if(shown){if(v===q.a)cls+=" ok";else if(v===sel&&v!==q.a)cls+=" ko";}
      else if(v===sel)cls+=" sel";
      ans_h+='<button class="'+cls+'" onclick="pickTF('+v+')"'+(shown?" disabled":"")+'>'+lbl+'</button>';
    });
    ans_h+='</div>';
  } else {
    var bcol=shown?(norm(fill)===norm(q.a)?"#2D5A27":"#D4603A"):l.theme;
    ans_h='<input id="fill-in" class="fill-inp'+(shown?(norm(fill)===norm(q.a)?" ok":" ko"):"")+'" placeholder="Écrivez votre réponse…" value="'+fill.replace(/"/g,'&quot;')+'"'+(shown?" disabled":"")+' style="border-color:'+bcol+'" oninput="QS.fill=this.value" onkeydown="if(event.key===\'Enter\')doCheck()">';
    if(shown)ans_h+='<div class="fill-ans">Réponse correcte : <strong>'+q.a+'</strong></div>';
  }

  var fb_h=shown?'<div class="fb '+(lastOk?"ok":"ko")+'">'+(lastOk?"✅ Bonne réponse ! +10 pts":"❌ Ce n\'est pas ça…")+'</div>':"";
  var btn_lbl=shown?(QS.idx+1>=total?"VOIR LES RÉSULTATS":"QUESTION SUIVANTE →"):"VALIDER";

  document.getElementById("q-body").innerHTML=
    '<div style="margin-bottom:12px">'+badge(typeLbl[q.tp]||q.tp,l.theme)+'</div>'
    +'<div class="qbox" style="border:1px solid '+l.theme+'33"><p class="qtxt">'+q.q+'</p></div>'
    +ans_h+fb_h
    +'<button class="act-btn" onclick="'+(shown?"nextQ()":"doCheck()")+'" style="background:'+l.theme+'">'+btn_lbl+'</button>';

  if(q.tp==="f"||q.tp==="s"||q.tp==="v"){
    var fi=document.getElementById("fill-in");
    if(fi){
      fi.setAttribute("autocapitalize","off");
      fi.setAttribute("autocorrect","off");
      fi.setAttribute("autocomplete","off");
      fi.setAttribute("spellcheck","false");
    }
  }
}

function pickOpt(i){if(QS.shown)return;QS.sel=i;renderQuiz();}
function pickTF(v){if(QS.shown)return;QS.sel=v;renderQuiz();}

function doCheck(){
  if(QS.shown)return;
  var q=QS.lesson.quiz[QS.idx];
  var ok=false;
  if(q.tp==="t"||q.tp==="m")ok=QS.sel===q.a;
  else if(q.tp==="tf")ok=QS.sel===q.a;
  else ok=norm(QS.fill)===norm(q.a);
  QS.results.push({ok:ok,q:q});
  if(ok)QS.score+=10;
  QS.shown=true;
  renderQuiz();
}

function nextQ(){
  if(QS.idx+1>=QS.lesson.quiz.length){showResult();return;}
  QS.idx++;QS.sel=null;QS.fill="";QS.shown=false;
  renderQuiz();
}

function showResult(){
  var total=QS.results.length;
  var correct=QS.results.filter(function(r){return r.ok;}).length;
  var pct=Math.round(correct/total*100);
  var grades=[
    {p:90,lbl:"Excellent !",col:"#2D5A27",e:"🏆"},
    {p:75,lbl:"Très bien !",col:"#0A7E8C",e:"⭐"},
    {p:60,lbl:"Bien !",col:"#C9943A",e:"👍"},
    {p:0,lbl:"À revoir",col:"#D4603A",e:"📚"},
  ];
  var grade=grades[grades.length-1];
  for(var i=0;i<grades.length;i++){if(pct>=grades[i].p){grade=grades[i];break;}}

  document.getElementById("r-ico").textContent=grade.e;
  document.getElementById("r-grade").textContent=grade.lbl;
  document.getElementById("r-grade").style.color=grade.col;
  document.getElementById("r-pct").textContent=pct+"%";
  document.getElementById("r-pct").style.color=grade.col;
  document.getElementById("r-sub").textContent=correct+"/"+total+" bonnes réponses · "+QS.score+" pts";

  var list_h="";
  QS.results.forEach(function(r){
    list_h+='<div class="res-item"><span>'+(r.ok?"✅":"❌")+'</span><span style="color:'+(r.ok?"#9ef":"#E8845F")+'">'+r.q.q.slice(0,55)+'…</span></div>';
  });
  document.getElementById("r-list").innerHTML=list_h;

  if(QS.lesson.id!==99){
    stats.totalScore=(stats.totalScore||0)+QS.score;
    stats.completed=stats.completed||[];
    if(stats.completed.indexOf(QS.lesson.id)<0)stats.completed.push(QS.lesson.id);
    stats.scores=stats.scores||{};
    stats.scores[QS.lesson.id]={correct:correct,total:total,score:QS.score};
    saveStats();
    renderHome();
    buildLessons();
  }

  document.getElementById("r-done").style.background=grade.col;
  document.getElementById("r-retry").style.borderColor=QS.lesson.theme;
  document.getElementById("r-retry").style.color=QS.lesson.theme;
  document.getElementById("r-retry").onclick=function(){
    QS={lesson:QS.lesson,idx:0,score:0,results:[],sel:null,fill:"",shown:false};
    renderQuiz();nav("s-quiz");
  };
  document.getElementById("r-done").onclick=function(){
    if(QS.lesson.id===99)nav("s-revision");
    else{buildDetail("cours");nav("s-detail");}
  };
  nav("s-result");
}

      h+='<div class="expr-card" style="border-left:4px solid '+l.theme+'">'

function buildStats(){
  var done=(stats.completed||[]).length;
  var scores=stats.scores||{};
  var totalScore=stats.totalScore||0;
  var totalWords=0;LESSONS.forEach(function(l){totalWords+=l.voc.length;});
  var avg=0;
  if(done>0){
    var sum=0;
    Object.keys(scores).forEach(function(k){var s=scores[k];sum+=s.correct/s.total*100;});
    avg=Math.round(sum/done);
  }
  var h='<div class="stats-grid">'
    +'<div class="stat-card" style="border:1px solid #C9943A33"><div style="font-size:26px">🏆</div><div style="font-size:26px;font-weight:700;color:#C9943A;font-family:\'Josefin Sans\',sans-serif">'+totalScore+'</div><div style="color:#888;font-size:12px;margin-top:4px">Points totaux</div></div>'
    +'<div class="stat-card" style="border:1px solid #12B5C833"><div style="font-size:26px">🎯</div><div style="font-size:26px;font-weight:700;color:#12B5C8;font-family:\'Josefin Sans\',sans-serif">'+avg+'%</div><div style="color:#888;font-size:12px;margin-top:4px">Réussite moy.</div></div>'
    +'<div class="stat-card" style="border:1px solid #2D5A2733"><div style="font-size:26px">📖</div><div style="font-size:26px;font-weight:700;color:#2D5A27;font-family:\'Josefin Sans\',sans-serif">'+done+"/7"+'</div><div style="color:#888;font-size:12px;margin-top:4px">Leçons finies</div></div>'
    +'<div class="stat-card" style="border:1px solid #D4603A33"><div style="font-size:26px">📚</div><div style="font-size:26px;font-weight:700;color:#D4603A;font-family:\'Josefin Sans\',sans-serif">'+totalWords+'</div><div style="color:#888;font-size:12px;margin-top:4px">Mots au dico</div></div>'
    +'</div>'
    +'<h3 style="font-family:\'Josefin Sans\',sans-serif;margin-bottom:12px">Détail par leçon</h3>';
  LESSONS.forEach(function(l){
    var sc=scores[l.id];
    var isDone=(stats.completed||[]).indexOf(l.id)>=0;
    h+='<div style="background:#1A3448;border-radius:12px;padding:14px 16px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px">'
      +'<span style="font-weight:600">'+l.emoji+' '+l.title+'</span>'
      +(isDone?badge("✓","#2D5A27"):badge("—","#555"))
      +'</div>'
      +(sc?pbar(sc.correct,sc.total,l.theme)+'<div style="color:'+l.theme+';font-size:12px;margin-top:5px">'+sc.correct+"/"+sc.total+" · "+Math.round(sc.correct/sc.total*100)+"%</div>"
          :'<div style="color:#555;font-size:13px">Pas encore tenté</div>')
      +'</div>';
  });
  document.getElementById("stats-body").innerHTML=h;
}

function buildRevision(){
  var all=[];LESSONS.forEach(function(l){l.quiz.forEach(function(q){all.push(q);});});
  var day=all.filter(function(_,i){return i%3===0;});
  var week=all.filter(function(_,i){return i%3!==0;});
  var modes=[
    {qs:day,title:"Révision du jour",emoji:"☀️",theme:"#C9943A",sub:day.length+" questions"},
    {qs:week,title:"Révision de la semaine",emoji:"📅",theme:"#0A7E8C",sub:week.length+" questions"},
    {qs:all,title:"Révision générale",emoji:"🌐",theme:"#D4603A",sub:all.length+" questions"},
  ];
  var h="";
  modes.forEach(function(r,i){
    h+='<button class="rev-card" onclick="startRevQuiz(window._revModes['+i+'].qs,\''+r.title+'\',\''+r.emoji+'\',\''+r.theme+'\')" style="border-color:'+r.theme+'44">'
      +'<div style="font-size:34px">'+r.emoji+'</div>'
      +'<div><div style="color:#FAFAF8;font-weight:700;font-family:\'Josefin Sans\',sans-serif;font-size:16px">'+r.title+'</div>'
      +'<div style="color:'+r.theme+';font-size:13px;margin-top:4px">'+r.sub+'</div></div>'
      +'<div style="margin-left:auto;color:'+r.theme+';font-size:18px">→</div>'
      +'</button>';
  });
  window._revModes=modes;
  document.getElementById("rev-body").innerHTML=h;
}

function openSpecies(idx){
  var sp=SPECIES[idx];
  document.getElementById("sp-det-title").textContent=sp.fr;
  var img_h=sp.img?'<img src="'+sp.img+'" alt="'+sp.fr+'" class="sp-det-img">':"";
  document.getElementById("sp-det-body").innerHTML=
    img_h+
    '<div class="sp-det-body">'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'
        +'<span class="badge" style="background:'+sp.col+'22;color:'+sp.col+';border:1px solid '+sp.col+'44">'+sp.cat+'</span>'
        +'<span style="color:#777;font-size:12px;font-style:italic">'+sp.sci+'</span>'
      +'</div>'
      +'<div class="sp-grid">'
        +'<div><div class="sp-lbl" style="color:#12B5C8">NÊLÊMWA (P)</div><div class="sp-val">'+sp.p+'</div></div>'
        +'<div><div class="sp-lbl" style="color:#E8845F">NIXUMWAK (K)</div><div class="sp-val">'+sp.k+'</div></div>'
        +'<div style="grid-column:1/-1;border-top:1px solid #ffffff11;padding-top:10px;color:#888;font-size:12px;font-style:italic">EN: '+sp.en+'</div>'
      +'</div>'
      +'<div class="sp-desc">'+sp.desc+'</div>'
      +'<div style="color:#333;font-size:11px;font-style:italic;text-align:center;margin-top:10px">Source : Dictionnaire Nêlêmwa–Nixumwak–Français–Anglais</div>'
    +'</div>';
  nav("s-sp-detail");
}

renderHome();
buildLessons();
</script>
